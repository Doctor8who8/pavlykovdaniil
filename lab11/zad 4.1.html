<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Совершенные числа</title>
<script>
function sumdel(n) {
    var s = 1;
    for (var i = 2; i <= n / 2; i++) {
        if (n % i == 0) s += i;
    }
    return s;
}

// Теперь функция принимает объект формы
function sov(obj) {
    var n = Number(obj.numb.value);
    var s = "";
    if (n == sumdel(n)) {
        s = "совершенное";
    } else {
        s = "не является совершенным";
    }
    obj.res.value = s;
}
</script>
</head>
<body>
<p>Совершенные числа</p>
<form name="form0">
    Введите натуральное число: <input type="text" size="8" name="numb">
    <input type="button" value="Выполнить" onClick="sov(this.form)"><hr>
    Данное число: <input type="text" size="24" name="res"><hr>
    <input type="reset" value="Отменить">
</form>
</body>
</html>
