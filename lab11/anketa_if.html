<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Анкета (if)</title>
</head>
<body>
    <script>
        // Спрашиваем ФИО тремя операторами prompt
        var lastName = prompt("Введите вашу фамилию:");
        var firstName = prompt("Введите ваше имя:");
        var patronymic = prompt("Введите ваше отчество:");
        
        // Возраст
        var ageStr = prompt("Введите ваш возраст в годах:");
        var age = Number(ageStr);
        
        // Пол
        var isMale = confirm("ваш пол - мужской?");

        // Обработка пола через if
        var genderText;
        if (isMale) {
            genderText = "мужской";
        } else {
            genderText = "женский";
        }

        // Вычисления
        var ageInDays = age * 365;
        var ageIn5Years = age + 5;

        // Определяем пенсию через if (условно: М >= 65, Ж >= 60)
        var isPensioner;
        if (isMale) {
            if (age >= 65) {
                isPensioner = "да";
            } else {
                isPensioner = "нет";
            }
        } else {
            if (age >= 60) {
                isPensioner = "да";
            } else {
                isPensioner = "нет";
            }
        }

        // Склеиваем итоговую строку
        var result = "ваше ФИО: " + lastName + " " + firstName + " " + patronymic + "\n" +
                     "ваш возраст в годах: " + age + "\n" +
                     "ваш возраст в днях: " + ageInDays + "\n" +
                     "через 5 лет вам будет: " + ageIn5Years + "\n" +
                     "ваш пол: " + genderText + "\n" +
                     "вы на пенсии: " + isPensioner;

        // Выводим оператором alert ровно один раз
        alert(result);
    </script>
</body>
</html>
