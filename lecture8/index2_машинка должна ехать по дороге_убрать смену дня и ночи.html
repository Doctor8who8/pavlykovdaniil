<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

      body {
        margin: 0;
        padding: 0;
      }
      .container {
        height: 100vh;
        width: 100%;
        position: relative; /* Добавлено для корректного позиционирования */
        overflow: hidden; /* Чтобы машина не создавала прокрутку */
      }
      .sky {
        height: 70vh;
        width:100%;
        background-color: lightskyblue;
      }
      .ground {
        height: 30vh;
        width:100%;
        background: green url(images/tie.png) repeat-x;
        position: relative;
      }
      .car {
        position: absolute;
        bottom: 20vh; /* Изменено: привязка к нижней части дороги */
        left: 0;
        animation-name: car;
        animation-duration: 20s;
        animation-timing-function: linear;
        animation-iteration-count: infinite; /* Опционально: зацикливание движения */
    }

      @keyframes car {

0% {
  transform: translateX(-200px);
}
100%{
    transform: translateX(100vw);
}
}
    </style>
  </head>

  <body>
    
    <div class="container">

      <div class="sky"></div>
      <div class="ground"></div>
      <div class="car"> <img src="images/car.png" alt="car"/></div>
      
        
     
      
    </div>
   
    

    </div>

    </div>
  </body>
</html>
