<html>
<head>
    <title> селекторы идентификатора </title>
    <style type='text/css'>
        #logo { 
            float: left;
            background-image: url("../../image/5-11.png"); /* фоновое изображение */
            background-position: center top; /* положение фона */
            background-size: contain; /* масштабируем фон */
            background-repeat: no-repeat; /* отмена повторения фона */
            width: 40%; /* ширина блока */
            height: 50px; /* высота блока */
        }
        #logo_text { 
            color: white;
            text-align: center; /* выравнивание текста по середине */
            text-shadow: 1px 1px 2px black, 0 0 15px blue; /* параметры тени текста */
        }
    </style>
</head>
<body>
    <div id="logo" title="логотип"> </div>
     <p id="logo_text"> В качестве логотипа использовался блок с фоновым изображением.</p>
</body>
</html>
