<html>
<head>
    <title>Соседние селекторы</title>
    <style type='text/css'>
        /* Стиль для <u>, который стоит сразу после <i> */
        i + u { 
            display: inline-block;
            padding: 10px;
            background-image: linear-gradient(to top left, rgba(0,0,255,1), rgba(255,255,255,1), rgba(0,0,255,1)); /* градиентная заливка фона */
        }
    </style>
</head>
<body>
    <p>
        <i>Соседние</i> селекторы относятся ко второй группе — <u>сложные селекторы</u>. 
        Как и <i>контекстные</i> селекторы.
    </p>
    <u>Свойства стиля </u>распространяются<i> только на теги &lt;u&gt;</i>, расположенные <u> сразу после &lt;i&gt;</u>.
</body>
</html>
