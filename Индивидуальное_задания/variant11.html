<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Практическая работа - Вариант 11</title>
</head>
<body>
    <h2>Решение задачи (Вариант 11)</h2>
    
    <script>
        // Запрашиваем у пользователя границы отрезка и число X
        let a = parseInt(prompt("Введите начало отрезка (a):", "1"));
        let b = parseInt(prompt("Введите конец отрезка (b):", "15"));
        let x = parseInt(prompt("Введите число X:", "8"));

        // Выводим исходные данные на страницу
        document.write("<p>Заданный отрезок: [" + a + ", " + b + "]</p>");
        document.write("<p>Заданное число X: " + x + "</p>");
        document.write("<b>Результат (числа меньше X): </b>");

        let found = false; // Флаг, чтобы проверить, нашли ли мы хоть одно число

        // Проходим циклом по всем числам от a до b включительно
        for (let i = a; i <= b; i++) {
            // Если текущее число меньше X, выводим его
            if (i < x) {
                document.write(i + " ");
                found = true;
            }
        }

        // Если подходящих чисел не оказалось
        if (found === false) {
            document.write("Таких чисел в отрезке нет.");
        }
    </script>
</body>
</html>
