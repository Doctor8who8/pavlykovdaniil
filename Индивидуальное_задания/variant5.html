<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Практическая работа - Вариант 5</title>
</head>
<body>
    <h2>Выполнение заданий (Вариант 5)</h2>

    <!-- Задание 1: Разработайте сценарий на JavaScript c использованием метода revers() объекта Array() -->
    <h3>Задание 1: Использование метода reverse()</h3>
    <script>
        // Создаем массив с числами
        var arr = [1, 2, 3, 4, 5];
        document.write("Исходный массив: " + arr + "<br>");
        
        // Применяем метод reverse()
        arr.reverse();
        document.write("Массив после применения reverse(): " + arr + "<br>");
    </script>

    <!-- Задание 2: Напишите сценарий, по которому выводится день недели текущей даты -->
    <h3>Задание 2: Вывод текущего дня недели</h3>
    <script>
        // Получаем текущую дату
        var today = new Date();
        // Получаем номер дня недели (от 0 до 6, где 0 - воскресенье)
        var dayNumber = today.getDay();
        
        // Создаем массив с названиями дней недели
        var days = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
        
        // Выводим день недели на экран
        document.write("Сегодняшний день недели: <b>" + days[dayNumber] + "</b><br>");
    </script>

    <!-- Задание 3: Составьте скрипт-программу, которая связывает две переданные строки в одну новую -->
    <h3>Задание 3: Связывание двух строк</h3>
    <script>
        // Функция, которая принимает две строки и связывает их
        function concatStrings(string1, string2) {
            var newString = string1 + " " + string2;
            return newString;
        }

        // Задаем исходные строки
        var word1 = "Изучение";
        var word2 = "JavaScript";
        
        // Вызываем функцию и сохраняем результат
        var result = concatStrings(word1, word2);

        // Выводим результаты
        document.write("Первая переданная строка: " + word1 + "<br>");
        document.write("Вторая переданная строка: " + word2 + "<br>");
        document.write("Новая связанная строка: <b>" + result + "</b><br>");
    </script>

</body>
</html>
