<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Вариант 13 - Практическая работа</title>
</head>
<body>
    <h2>Вычисление суммы ряда</h2>
    
    <script>
        // Функция для вычисления суммы ряда (левая часть уравнения)
        // Параметр n - количество слагаемых
        function calculateSeriesSum(n) {
            let sum = 0;
            for (let i = 1; i <= n; i++) {
                // Формула i-го члена: 1 / ((2i - 1)(2i + 1))
                sum = sum + (1 / ((2 * i - 1) * (2 * i + 1)));
            }
            return sum;
        }

        // Запрашиваем у пользователя количество слагаемых
        let n = parseInt(prompt("Введите количество слагаемых n:", 5));

        // Проверяем, что ввели корректное число
        if (isNaN(n) || n <= 0) {
            document.write("<p>Ошибка: введите положительное целое число.</p>");
        } else {
            // Вычисляем значение слева с помощью функции
            let leftValue = calculateSeriesSum(n);
            
            // Вычисляем значение справа по формуле n / (2n + 1)
            let rightValue = n / (2 * n + 1);

            // Выводим результаты на экран
            document.write("<p>Количество просуммированных членов ряда (n): <b>" + n + "</b></p>");
            document.write("<p>Значение выражения слева (через цикл): <b>" + leftValue + "</b></p>");
            document.write("<p>Значение выражения справа (по формуле): <b>" + rightValue + "</b></p>");

            // Сравниваем значения с учетом погрешности вычислений дробных чисел в JavaScript
            // (Math.abs возвращает модуль числа)
            if (Math.abs(leftValue - rightValue) < 0.000001) {
                document.write("<p style='color: green;'>Проверка пройдена: значения слева и справа равны!</p>");
            } else {
                document.write("<p style='color: red;'>Проверка не пройдена: значения не равны.</p>");
            }
        }
    </script>
</body>
</html>
