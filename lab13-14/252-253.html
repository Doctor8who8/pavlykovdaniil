<html>
<head>
    <title> Array </title>
    <script type='text/javascript'>
        let arr = ['banan.jpg', 'klybn.jpg', 'lemon.jpg', 'orange.jpg'];
        let n = 2;

        function r_image()
        {
            ++n;
            if (n >= arr.length) n = 0;
            document.images[0].src = 'images/' + arr[n];
        }

        function l_image()
        {
            --n;
            if (n < 0) n = arr.length - 1;
            document.images[0].src = 'images/' + arr[n];
        }
    </script>
</head>
<body>
<center>
    <img id='pict' src="images\lemon.jpg" height=200> <br><br>
    <input type=button onClick='l_image();' value=' &#8592; '>
    <input type=button onClick='r_image();' value=' &#8594; '>
</center>
</body>
</html>
