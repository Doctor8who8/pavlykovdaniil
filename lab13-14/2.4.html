<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вывод реального времени</title>
    <meta http-equiv="Content-Type" content="text/html; charset=windows-1251">
</head>
<body>
<script>
var now = new Date();

// Выводим время (Часы:Минуты)
document.write("Time:" + now.getHours() + ":" + now.getMinutes() + "<br>");

// Выводим дату (Месяц/День/Год)
document.write("Date:" + (now.getMonth() + 1) + "/" + now.getDate() + "/" + now.getYear());
</script>
</body>
</html>
