<!DOCTYPE html>
<html>
<head>
<title>Array</title>
</head>
<body>
<script>
var days = new Array();
days[0] = "воскресенье";
days[1] = "понедельник";
days[2] = "вторник";
days[3] = "среда";
days[4] = "четверг";
days[0] = "пятница"; // Перезапись нулевого элемента
days[10] = "XXXXX";  // Создание "дыры" в массиве до 10 индекса

document.write(days, "<br><br>"); // Вывод всего массива через запятую

for(var i = 0; i < days.length; i++) {
    document.write(days[i], "<br>");
}
</script>
</body>
</html>
