<html>
<head>
<title>Параметр scoped в элементе style</title>
</head>
<body>
    <p>Обычный текст.</p>
    <div>
        <style scoped>
            p { font-size: 18pt; color: red; }
        </style>
        <p>Текст, отформатированный с помощью таблицы стилей,
        расположенной в техническом заголовке документа и элементе
        "div".</p>
    </div> 
</body>
</html>
