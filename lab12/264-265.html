<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
function makeCounter() {
  let count = 0;
  return function() {
    return count++;
    // есть доступ к внешней переменной count
  };
}

let counter1 = makeCounter();
alert(counter1()); // // 0
alert(counter1()); // // 1
alert(counter1()); // // 2

let counter2 = makeCounter();
alert(counter2()); // // 0
</script>
</body>
</html>
