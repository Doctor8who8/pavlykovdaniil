<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="volna.css">
    <style type="text/css">
        body {
            /* Устанавливаем изображение фоном */
            background-image: url('raduga.jpg');
            
            /* Повторяем изображение по вертикали, если оно короткое */
            background-repeat: repeat-y;
            
            /* Центрируем изображение по горизонтали */
            background-position: center top;
            
            /* Фон вокруг будет фиолетовым, как указано в volna.css */
            margin: 0;
            padding: 0;
            height: 100vh; /* Растягиваем на всю высоту */
        }
    </style>
</head>
<body>
</body>
</html>
