<body>
    <h2>А.С. Пушкин</h2>
    
    <p>
        Если жизнь тебя обманет,<br>
        Не печалься, не сердись!<br>
        В день уныния смирись:<br>
        День веселья, верь, настанет.
    </p>

    <p>
        Сердце в будущем живет;<br>
        Настоящее уныло:<br>
        Все мгновенно, все пройдет;<br>
        Что пройдет, то будет мило.
    </p>
</body>
</html>
