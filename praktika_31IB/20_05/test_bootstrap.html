<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блочная верстка Bootstrap 5.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px 0;
        }
        
        /* Общие контейнеры секций (соответствуют цветам на макете) */
        .header-box, .footer-box {
            background-color: #e2ecf5;
            border: 1px solid #b0c4de;
            padding: 15px;
        }

        .sidebar-left, .sidebar-right {
            background-color: #e7f0e4;
            border: 1px solid #c2d6bc;
            padding: 15px;
            min-height: 100%;
        }

        .content-box {
            background-color: #e2ecf5;
            border: 1px solid #b0c4de;
            padding: 15px;
            min-height: 100%;
        }

        /* Стили для изображений, чтобы они имели одинаковый отступ снизу */
        .grid-image {
            margin-bottom: 15px;
            width: 100%;
            object-fit: cover;
        }

        /* Убираем нижний отступ у последнего элемента в колонке */
        .grid-image:last-child, .row:last-child .grid-image {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container text-center">

    <header class="row mb-3">
        <div class="col-12">
            <div class="header-box">
                <div class="row g-2">
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-2"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="row mb-3 g-3">
        
        <aside class="col-md-3 col-lg-2">
            <div class="sidebar-left rounded">
                <img src="car.jpg" class="img-fluid rounded grid-image" alt="Car">
                <img src="car.jpg" class="img-fluid rounded grid-image" alt="Car">
                <img src="car.jpg" class="img-fluid rounded grid-image" alt="Car">
            </div>
        </aside>

        <main class="col-md-6 col-lg-8">
            <div class="content-box rounded">
                <div class="row g-2">
                    <div class="col-3"><img src="car.jpg" class="img-fluid rounded grid-image" alt="Car"></div>
                    <div class="col-3"><img src="car.jpg" class="img-fluid rounded grid-image" alt="Car"></div>
                    <div class="col-3"><img src="car.jpg" class="img-fluid rounded grid-image" alt="Car"></div>
                    <div class="col-3"><img src="car.jpg" class="img-fluid rounded grid-image" alt="Car"></div>
                </div>
                
                <div class="d-flex align-items-center justify-content-center" style="min-height: 250px;">
                </div>
            </div>
        </main>

        <aside class="col-md-3 col-lg-2">
            <div class="sidebar-right rounded">
                <img src="car.jpg" class="img-fluid rounded grid-image" alt="Car">
                <img src="car.jpg" class="img-fluid rounded grid-image" alt="Car">
            </div>
        </aside>

    </div>

    <footer class="row">
        <div class="col-12">
            <div class="footer-box">
                <div class="row g-3">
                    <div class="col-4"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-4"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                    <div class="col-4"><img src="car.jpg" class="img-fluid rounded" alt="Car"></div>
                </div>
            </div>
        </div>
    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
