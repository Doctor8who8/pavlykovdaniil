<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>адаптивная верстка</title>
    <style type="text/css">
        div { 
            font-family: Arial, sans-serif;
            text-align: center; 
        }
        body { 
            display: grid;
            height: 98vh; 
        }

        /* 1 медиазапрос: устройства до 360px (например, Galaxy S5) */
        @media only screen and (max-width: 360px) {
            body { 
                font-size: 2vh;
                grid-template-areas: 
                    "header"
                    "nav"
                    "content"
                    "sidebar"
                    "footer";
                grid-template-rows: 60px 60px 1fr 40px 60px;
                grid-template-columns: 1fr; 
            }
        }

        /* 2 медиазапрос: устройства от 361px до 760px (например, Nexus 7 в портретной ориентации) */
        @media only screen and (min-width: 361px) and (max-width: 760px) {
            body { 
                font-size: 2vh;
                grid-template-areas: 
                    "header header"
                    "nav sidebar"
                    "content content"
                    "footer footer";
                grid-template-rows: 100px 1fr 3fr 100px;
                grid-template-columns: 3fr 1fr; 
            }
        }

        /* 3 медиазапрос: устройства от 761px, портретная ориентация */
        @media only screen and (min-width: 761px) and (orientation: portrait) {
            body { 
                font-size: 2vh;
                grid-template-areas: 
                    "header header"
                    "nav content"
                    "sidebar content"
                    "footer footer";
                grid-template-rows: 100px 2fr 1fr 100px;
                grid-template-columns: 1fr 2fr; 
            }
        }

        /* 4 медиазапрос: устройства от 761px до 1200px, альбомная ориентация (например, Nexus 7 ландшафт) */
        @media only screen and (min-width: 761px) and (max-width: 1200px) and (orientation: landscape) {
            body { 
                font-size: 4vh;
                grid-template-areas: 
                    "header header header"
                    "nav content content"
                    "sidebar content content"
                    "footer footer footer";
                grid-template-rows: 100px 3fr 1fr 100px;
                grid-template-columns: 1fr 2fr 2fr; 
            }
        }

        /* Медиазапрос для больших экранов: от 1201px (например, Nexus 10 ландшафт) */
        @media only screen and (min-width: 1201px) {
            body { 
                font-size: 4vh;
                grid-template-areas: 
                    "header header header"
                    "nav content sidebar"
                    "nav content ."
                    "footer footer footer";
                grid-template-rows: 100px auto 300px 100px;
                grid-template-columns: 1fr 3fr 0.5fr; 
            }
        }

        /* Стили для блоков */
        #header { border: 5px solid blue; grid-area: header; }
        #nav { border: 5px solid lime; grid-area: nav; }
        #sidebar { border: 5px solid aqua; grid-area: sidebar; }
        #content { border: 5px solid yellow; grid-area: content; }
        #footer { border: 5px solid red; grid-area: footer; }
    </style>
</head>
<body>
    <div id="header"> header (шапка сайта) </div>
    <div id="nav"> меню навигации </div>
    <div id="sidebar"> доп. панель </div>
    <div id="content"> </div>
    <div id="footer"> footer (подвал) </div>
</body>
</html>
