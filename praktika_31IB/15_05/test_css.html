<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
        div ul li a {
            color: red;
        }

        div ul li span a {
            color: green;
        }

        div ul li em a {
            color: blue;
        }

        div p em {
            color: yellow;
        }

        div span em a {
            color: black;
        }

        ul li a {
            color: orange;
        }

        ul li span a {
            color: rosybrown;
        }

        ul li em a {
            color: violet;
        }

        ul li p em a {
            color: aqua;
        }

        ul li div ul li a {
            color: indigo;
        }

        ul li div ul li em a {
            color: chocolate;
        }

        ul li div ul li span a {
            color: brown;
        }

        ul li div p a {
            color: white;
        }

        p em a {
            color: gray;
        }
    </style>
</head>
<body>
    <p>
        <em>
            <a>
                gray
            </a>
        </em>
    </p>

    <ul>
        <li>
            <div>
                <p>
                    <a>
                        white
                    </a>
                </p>
                <ul>
                    <li>
                        <span>
                            <a>
                                brown
                            </a>
                        </span>
                    </li>
                    <li>
                        <em>
                            <a>
                                chocolate
                            </a>
                        </em>
                    </li>
                    <li>
                        <a>
                            indigo
                        </a>
                    </li>
                </ul>
            </div>
        </li>
        <li>
            <p>
                <em>
                    <a>
                        aqua
                    </a>
                </em>
            </p>
        </li>
        <li>
            <em>
                <a>
                    violet
                </a>
            </em>
            <span>
                <a>
                    rosybrown
                </a>
            </span>
            <a>
                orange
            </a>
        </li>
    </ul>

    <div>
        <p>
            <em>
                yellow
            </em>
        </p>
        <span>
            <em>
                <a>
                    black
                </a>
            </em>
        </span>
        <ul>
            <li>
                <em>
                    <a>
                        blue
                    </a>
                </em>
            </li>
            <li>
                <span>
                    <a>
                        green
                    </a>
                </span>
            </li>
            <li>
                <a>
                    red
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
